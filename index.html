
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>calculadora</title>
</head>
<body>
     
    <div class="wrapper">
       <section class="screen">
         0
       </section>

<section class="calculadora-buttons">
   <div class="calculadora-button-row">
    <button class="calculadora-button double">
        c
    </button>
  <button class="calculadora-button">
    &larr;
  </button>

<button class="calculadora-button">
    &divide;
</button>

   </div>

    <div class="calculadora-button-row">

    <button class="calculadora-button">
        7
    </button>

    <button class="calculadora-button">
        8
    </button>
    <button class="calculadora-button">
        9
    </button>
    <button class="calculadora-button">
        &times;
    </button>
   </div>

   <div class="calculadora-button-row">
    <button class="calculadora-button">
        4
    </button>
    <button class="calculadora-button">
        5
    </button>
    <button class="calculadora-button">
        6
    </button>
    <button class="calculadora-button">
        &minus;
    </button>

   </div>

    <div class="calculadora-button-row">
        <button class="calculadora-button">
            1
        </button>
        <button class="calculadora-button">
            2
        </button>
        <button class="calculadora-button">
            3
        </button>
        <button class="calculadora-button">
            &plus;
        </button>
    </div>

<div class="calculadora-button-row">
    <button class="calculadora-button triple">
        0
    </button>
   
    <button class="calculadora-button">
        &equals;
    </button>
</div>




</section>



<script src="script.js"></script>
    </div>









<script src="script.js"></script>
    
</body>
</html>
